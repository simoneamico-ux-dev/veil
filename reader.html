<!DOCTYPE html>
<html lang="en">
<head>

<!--
  DESIGN
  ------
  This is the PDF reader, the core of veil. The page has three states:

  1. Drop zone: the first thing the user sees. A wordmark, a tagline,
     and an invisible file input. On desktop the entire screen is a drop
     target. On mobile a "Browse PDF" button opens the native file picker.
     Three veil layers (dark divs) slide apart when a PDF loads, creating
     a curtain-parting effect that masks the loading time.

  2. Reader: the toolbar pill at the top, the PDF viewport below.
     The toolbar contains navigation, zoom, dark mode toggle, and export.
     It auto-hides after a timeout (focus mode) to maximize reading space.
     Page containers inside the viewport are created dynamically by app.js
     using virtual scrolling (only 7-15 containers exist at any time).

  3. App loader: a pulsing "veil" wordmark shown while IndexedDB
     deserializes the saved PDF on mobile. Hardcoded in HTML (not JS)
     so it appears instantly from the service worker precache.

  Accessibility: every interactive element has aria-label, the page
  counter uses aria-live, toolbar buttons have aria-keyshortcuts,
  a screen reader announcer div broadcasts dynamic events, and
  the dark mode toggle uses aria-pressed.

  Security: Content-Security-Policy restricts script sources to self
  and the three CDNs used by the app. Inline scripts are blocked.
-->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>veil - open any PDF in dark mode</title>
  <meta name="description" content="Open any PDF in true dark mode. Drop a file, read with images preserved and links intact. Runs in your browser, nothing uploaded." />
  <link rel="canonical" href="https://veil.simoneamico.com/reader" />
  <meta name="theme-color" content="#0a0806">
  <meta name="color-scheme" content="dark">
  <meta property="og:title" content="veil - open any PDF in dark mode" />
  <meta property="og:description" content="Open any PDF in true dark mode. Images preserved, links intact, runs entirely in your browser." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://veil.simoneamico.com/reader" />
  <meta property="og:image" content="https://veil.simoneamico.com/icon/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="veil - open any PDF in dark mode" />
  <meta name="twitter:description" content="Open any PDF in true dark mode. Images preserved, links intact." />
  <meta name="twitter:image" content="https://veil.simoneamico.com/icon/og-image.png" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://esm.sh 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://esm.sh https://fonts.googleapis.com https://fonts.gstatic.com blob: data:; img-src 'self' blob: data:; worker-src 'self' blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon/favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icon/manifest-icon.png">
  <link rel="apple-touch-icon" href="icon/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Hint the browser to start downloading PDF.js before the import
       statement in app.js is parsed. Saves ~100-200ms on first load -->
  <link rel="modulepreload" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.min.mjs">
</head>
<body>

  <!-- Page transition: amber glow that fades out on arrival -->
  <div id="page-transition" class="page-transition-overlay active" aria-hidden="true"></div>

  <!-- Drop Zone: the entire div is the drop target on desktop.
       The file input is visually hidden (sr-only) but still in the
       layout so Safari iOS recognizes the <label> association.
       Using hidden or display:none would break the file picker on Safari -->
  <div id="drop-zone" role="button" tabindex="0" aria-label="Drop a PDF file or click to browse">
    <input type="file" id="file-input" accept=".pdf" class="sr-only">

    <a href="index.html" class="drop-about">What is veil?</a>

    <div class="drop-hero">
      <div class="drop-wordmark" aria-label="veil">
veil
      </div>
      <p class="drop-tagline drop-tagline-desktop">Drop a PDF, protect your eyes</p>
      <p class="drop-tagline drop-tagline-mobile">Protect your eyes</p>
      <label for="file-input" class="drop-browse-btn">Browse PDF</label>
    </div>


    <!-- veil layers: slide apart when a PDF loads, like curtains parting.
         Three layers at different speeds create parallax depth. -->
    <div class="veil-layer veil-layer-1" aria-hidden="true"></div>
    <div class="veil-layer veil-layer-2" aria-hidden="true"></div>
    <div class="veil-layer veil-layer-3" aria-hidden="true"></div>
  </div>

  <!-- Reader -->
  <div id="reader" hidden>
    <header id="toolbar">
      <a href="#" class="toolbar-logo" title="Back to drop zone" id="btn-home">
        <span class="nav-wordmark" aria-label="veil">
veil
        </span>
      </a>

      <div class="toolbar-divider toolbar-filename-divider"></div>

      <span id="file-name" class="toolbar-filename"></span>

      <div class="toolbar-divider toolbar-filename-divider"></div>

      <nav class="toolbar-nav">
        <button id="btn-prev" title="Previous page (←)" aria-label="Previous page" aria-keyshortcuts="ArrowLeft" disabled>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span id="page-info" aria-live="polite">1 / 1</span>
        <button id="btn-next" title="Next page (→)" aria-label="Next page" aria-keyshortcuts="ArrowRight" disabled>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </nav>

      <div class="toolbar-divider"></div>

      <button id="btn-zoom-out" title="Zoom out (Cmd+-)" aria-label="Zoom out" aria-keyshortcuts="Meta+Minus Control+Minus">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <span id="zoom-level" class="toolbar-zoom-level">100%</span>
      <button id="btn-zoom-in" title="Zoom in (Cmd++)" aria-label="Zoom in" aria-keyshortcuts="Meta+Equal Control+Equal">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      <div class="toolbar-divider"></div>

      <button id="btn-toggle" class="toggle-active" title="Toggle dark mode (D)" aria-label="Dark mode" aria-pressed="true" aria-keyshortcuts="d">
        <svg id="icon-dark" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-light" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <button id="btn-export" title="Export dark PDF" aria-label="Export dark PDF">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>

    </header>

    <!-- The viewport is intentionally empty in the HTML. app.js creates
         a scroll spacer and 7-15 recycled page containers at runtime
         via virtual scrolling. Only pages near the viewport exist in
         the DOM at any given time -->
    <main id="viewport" aria-label="PDF document"></main>

    <div id="error-banner" hidden role="alert" aria-live="assertive">
      <span id="error-message"></span>
      <button id="error-dismiss" aria-label="Dismiss">&times;</button>
    </div>

    <div id="info-banner" hidden aria-live="polite">
      <span id="info-message"></span>
    </div>

    <!-- Screen reader announcements for dynamic events -->
    <div id="sr-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <div id="export-progress" hidden>
      <div class="export-progress-bar">
        <div class="export-progress-fill"></div>
      </div>
      <span class="export-progress-text"></span>
      <button id="export-cancel" aria-label="Cancel export">&times;</button>
    </div>
  </div>

  <!-- App shell loader: shown while IndexedDB deserializes the saved
       PDF on mobile. Hardcoded in HTML so it appears instantly from
       the precache, before any JS executes. Hidden by app.js once
       the PDF is loaded or the drop zone is shown. -->
  <div id="app-loader" hidden>
    <div class="app-loader-wordmark">
veil
    </div>
  </div>

  <!-- app.js is a module (deferred by default, runs after HTML parsing).
       sw-register.js is a classic script (runs immediately) so the
       service worker starts caching resources as early as possible -->
  <script type="module" src="app.js"></script>
  <script src="sw-register.js"></script>
</body>
</html>
